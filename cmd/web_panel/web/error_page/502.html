<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>502 – Bad Gateway</title>
    <script>
        // Localization strings
        const locales = {
            en: {
                error: "Bad Gateway",
                desc: "We're having trouble reaching the upstream server.<br> Please try again in a moment.",
                retry: "Retry",
                home: "Home",
                support: "Support",
                auto: "Auto retry in",
                details: "Show technical details",
                hideDetails: "Hide technical details",
                clock: "Current time",
                copyright: "© 2025 - PT. Cyber Smart Network Asia",
                lang: "ID",
                darkMode: "Dark Mode",
                lightMode: "Light Mode"
            },
            id: {
                error: "Gateway Bermasalah",
                desc: "Kami mengalami kesulitan menghubungi server.<br> Silakan coba lagi sebentar.",
                retry: "Coba Lagi",
                home: "Beranda",
                support: "Dukungan",
                auto: "Coba otomatis dalam",
                details: "Tampilkan detail teknis",
                hideDetails: "Sembunyikan detail teknis",
                clock: "Waktu sekarang",
                copyright: "© 2025 - PT. Cyber Smart Network Asia",
                lang: "EN",
                darkMode: "Mode Gelap",
                lightMode: "Mode Terang"
            }
        };
        let currentLocale = 'en';
        function t(key) { return locales[currentLocale][key]; }
    </script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bs-body-bg);
        }

        .error-card {
            max-width: 750px;
            border-radius: 1rem;
            box-shadow: 0 1rem 2rem rgba(0, 0, 0, .25);
            overflow: hidden;
        }

        @media (max-width: 600px) {
            .error-card {
                max-width: 98vw;
            }

            .btn,
            .btn-outline-secondary {
                font-size: 1.2rem;
                padding: .75rem 1.5rem;
            }

            .display-5 {
                font-size: 2.5rem;
            }
        }

        .clock {
            font-size: 1.25rem;
            font-weight: 500;
            color: #6366f1;
            margin-top: 1rem;
            letter-spacing: 2px;
        }

        .details-section {
            display: none;
            background: #212529;
            color: #fff;
            border-radius: .5rem;
            padding: 1rem;
            margin-top: 1rem;
            font-size: .95rem;
            text-align: left;
        }

        /* Animation area */
        .stage {
            position: relative;
            aspect-ratio: 4/3;
            border-radius: .75rem;
            overflow: hidden;
            background: rgba(255, 255, 255, .05);
        }

        .cloud {
            position: absolute;
            right: 10%;
            bottom: 15%;
            width: 180px;
            height: 90px;
            background: #6c757d;
            border-radius: 45px;
            animation: floatUp 6s ease-in-out infinite;
        }

        .cloud::before,
        .cloud::after {
            content: "";
            position: absolute;
            background: #6c757d;
            border-radius: 50%;
        }

        .cloud::before {
            width: 110px;
            height: 110px;
            top: -55px;
            left: 20px;
        }

        .cloud::after {
            width: 90px;
            height: 90px;
            top: -45px;
            left: 90px;
        }

        @keyframes floatUp {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .gear {
            position: absolute;
            right: 2%;
            bottom: 5%;
            font-size: 3rem;
            color: #0d6efd;
            animation: spin 6s linear infinite;
        }

        .gear.small {
            font-size: 2rem;
            right: 18%;
            bottom: 10%;
            color: #20c997;
            animation-direction: reverse;
            animation-duration: 4s;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .led {
            position: absolute;
            bottom: 10px;
            left: 10px;
            display: flex;
            gap: .5rem;
        }

        .led span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #dc3545;
            box-shadow: 0 0 8px #dc3545;
            animation: blink 1.5s infinite;
        }

        .led span.ok {
            background: #20c997;
            box-shadow: 0 0 8px #20c997;
            animation-delay: .4s;
        }

        .led span.warn {
            background: #ffc107;
            box-shadow: 0 0 8px #ffc107;
            animation-delay: .8s;
        }

        @keyframes blink {
            50% {
                opacity: .5;
                transform: scale(.8);
            }
        }
    </style>
</head>

<body>
    <div class="card error-card text-center bg-body-tertiary" role="alert" aria-labelledby="errorTitle"
        aria-describedby="errorDesc">
        <div class="card-body p-4 p-md-5">
            <div class="row g-4 align-items-center">
                <!-- Animation -->
                <div class="col-md-6">
                    <div class="stage">
                        <div class="cloud"></div>
                        <i class="bx bx-cog gear"></i>
                        <i class="bx bx-cog gear small"></i>
                        <div class="led">
                            <span></span>
                            <span class="ok"></span>
                            <span class="warn"></span>
                        </div>
                    </div>
                </div>

                <!-- Text -->
                <div class="col-md-6 text-md-start">
                    <h1 id="errorTitle" class="display-5 fw-bold text-danger">502</h1>
                    <p id="errorDesc" class="lead"></p>
                    <p class="text-secondary" id="errorDesc2"></p>
                    <div class="d-flex flex-wrap gap-2 mt-3">
                        <button id="retryBtn" class="btn btn-primary" aria-label="Retry"><i
                                class="bx bx-refresh me-2"></i><span class="btn-text">Retry</span></button>
                        <a href="/" class="btn btn-outline-secondary" aria-label="Home"><i
                                class="bx bx-home me-2"></i><span class="btn-text">Home</span></a>
<a href="https://wa.me/6287883507445" class="btn btn-outline-success" aria-label="Support"><i
                                class="bx bxl-whatsapp me-2"></i><span class="btn-text">Support</span></a>
                        <button id="showDetails" class="btn btn-outline-warning" aria-label="Show technical details"><i
                                class="bx bx-info-circle me-2"></i><span class="btn-text">Show technical
                                details</span></button>
                    </div>
                    <small id="autoMsg" class="d-block mt-3 text-muted"></small>
                    <div class="details-section" id="detailsSection" tabindex="0" aria-label="Technical details">
                        <strong>Technical Details:</strong><br>
                        <span id="techDetails">No additional details available.</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-footer bg-body d-flex justify-content-between align-items-center">
            <small class="text-muted" id="copyrightMsg">© 2025 Your Company</small>
            <div class="flex-grow-1 text-center">
                <span class="clock" id="footerClock" aria-live="polite"></span>
            </div>
            <div class="d-flex gap-2">
                <button id="toggleTheme" class="btn btn-sm btn-outline-secondary" aria-label="Toggle theme"><i
                        class="bx bx-adjust me-1"></i><span class="btn-text">Toggle Theme</span></button>
                <button id="toggleLang" class="btn btn-sm btn-outline-secondary" aria-label="Change language"><i
                        class="bx bx-globe me-1"></i><span class="btn-text">ID</span></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Accessibility: focus on error title
            var errorTitle = document.getElementById("errorTitle");
            if (errorTitle && errorTitle.focus) errorTitle.focus();

            // Localization
            function updateLocale() {
                var errorDesc = document.getElementById("errorDesc");
                var errorDesc2 = document.getElementById("errorDesc2");
                var retryBtnText = document.querySelector("#retryBtn .btn-text");
                var toggleLangText = document.querySelector("#toggleLang .btn-text");
                var showDetailsText = document.querySelector("#showDetails .btn-text");
                var copyrightMsg = document.getElementById("copyrightMsg");
                var autoMsg = document.getElementById("autoMsg");
                var clockLabel = document.getElementById("clockLabel");
                var supportBtnText = document.querySelector("a[aria-label='Support'] .btn-text");
                var homeBtnText = document.querySelector("a[aria-label='Home'] .btn-text");
                if (errorDesc) errorDesc.innerHTML = t('error');
                if (errorDesc2) errorDesc2.innerHTML = t('desc');
                if (retryBtnText) retryBtnText.textContent = t('retry');
                if (toggleLangText) toggleLangText.textContent = t('lang');
                if (showDetailsText) showDetailsText.textContent = t('details');
                if (copyrightMsg) copyrightMsg.textContent = t('copyright');
                if (autoMsg) autoMsg.textContent = `${t('auto')} 10s…`;
                if (clockLabel) clockLabel.textContent = t('clock');
                if (supportBtnText) supportBtnText.textContent = t('support');
                if (homeBtnText) homeBtnText.textContent = t('home');
                updateThemeButton(); // Update theme button text with new locale
            }
            updateLocale();
            var toggleLang = document.getElementById("toggleLang");
            if (toggleLang) {
                toggleLang.addEventListener("click", function () {
                    currentLocale = currentLocale === 'en' ? 'id' : 'en';
                    updateLocale();
                });
            }

            // Retry button
            var retryBtn = document.getElementById("retryBtn");
            if (retryBtn) {
                retryBtn.addEventListener("click", function () {
                    location.reload();
                });
            }

            // Countdown auto-retry
            var msg = document.getElementById("autoMsg");
            var s = 5 * 60; // Minutes
            function tick() {
                if (msg) msg.textContent = `${t('auto')} ${s}s…`;
                if (s-- <= 0) location.reload();
                else setTimeout(tick, 1000);
            }
            tick();

            // Live clock (main and footer) in Jakarta timezone
            function updateClock() {
                const now = new Date();
                const jakartaTime = new Intl.DateTimeFormat('en-US', {
                    timeZone: 'Asia/Jakarta',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                }).format(now);
                var clock = document.getElementById('clock');
                var footerClock = document.getElementById('footerClock');
                if (clock) clock.textContent = `${t('clock')}: ${jakartaTime} WIB`;
                if (footerClock) footerClock.textContent = `${jakartaTime} WIB`;
            }
            setInterval(updateClock, 1000);
            updateClock();

            // Function to update theme button
            function updateThemeButton() {
                var toggleTheme = document.getElementById("toggleTheme");
                if (toggleTheme) {
                    var html = document.documentElement;
                    var isDark = html.dataset.bsTheme === "dark";
                    var icon = toggleTheme.querySelector('i');
                    var btnText = toggleTheme.querySelector('.btn-text');

                    if (icon) {
                        icon.className = isDark ? 'bx bx-sun me-1' : 'bx bx-moon me-1';
                    }
                    if (btnText) {
                        btnText.textContent = isDark ? t('lightMode') : t('darkMode');
                    }
                }
            }

            // Dark/Light theme toggle
            var toggleTheme = document.getElementById("toggleTheme");
            if (toggleTheme) {
                updateThemeButton(); // Set initial state
                toggleTheme.addEventListener("click", function () {
                    var html = document.documentElement;
                    html.dataset.bsTheme = html.dataset.bsTheme === "dark" ? "light" : "dark";
                    updateThemeButton(); // Update after change
                });
            }

            // Technical details toggle with icon change
            var detailsBtn = document.getElementById("showDetails");
            var detailsSection = document.getElementById("detailsSection");
            let detailsVisible = false;
            if (detailsBtn && detailsSection) {
                detailsBtn.addEventListener("click", function () {
                    detailsVisible = !detailsVisible;
                    detailsSection.style.display = detailsVisible ? "block" : "none";
                    var btnText = detailsBtn.querySelector('.btn-text');
                    if (btnText) btnText.textContent = detailsVisible ? t('hideDetails') : t('details');
                    var icon = detailsBtn.querySelector('i');
                    if (icon) {
                        if (detailsVisible) {
                            icon.classList.remove('bx-info-circle');
                            icon.classList.add('bx-x-circle');
                            detailsSection.focus();
                        } else {
                            icon.classList.remove('bx-x-circle');
                            icon.classList.add('bx-info-circle');
                        }
                    }
                });
                // Accessibility: keyboard navigation for details
                detailsBtn.addEventListener("keydown", function (e) {
                    if (e.key === "Enter" || e.key === " ") {
                        detailsBtn.click();
                    }
                });
            }

            // Analytics: log error page view
            console.log("[Analytics] 502 error page viewed at", new Date().toISOString());

            // Parse URL parameters for technical details
            function getUrlParameter(name) {
                name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
                var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
                var results = regex.exec(location.search);
                return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
            }

            // Populate technical details
            var techDetails = document.getElementById('techDetails');
            if (techDetails) {
                var status = getUrlParameter('status') || '502';
                var upstreamStatus = getUrlParameter('upstream_status') || 'Unknown';
                var requestUri = getUrlParameter('request_uri') || 'Unknown';
                var server = getUrlParameter('server') || 'Unknown';
                var time = getUrlParameter('time') || new Date().toISOString();

                techDetails.innerHTML = `
                    <strong>Status:</strong> ${status}<br>
                    <strong>Upstream Status:</strong> ${upstreamStatus}<br>
                    <strong>Request URI:</strong> ${requestUri}<br>
                    <strong>Server:</strong> ${server}<br>
                    <strong>Time:</strong> ${time}
                `;
            }
        });
    </script>
</body>

</html>
