{{ define "loading_infinity_theme" }}
<style>
    main {
        padding: 1.5em 0;
        animation: fadeIn 1s ease-in-out;
    }

    .ip {
        width: 16em;
        height: 8em;
        animation: pulse 2.5s ease-in-out infinite;
    }

    .ip__track {
        stroke: hsl(var(--hue), 90%, 90%);
        transition: stroke var(--trans-dur);
    }

    .ip__worm1,
    .ip__worm2 {
        animation: worm1 2s linear infinite;
    }

    .ip__worm2 {
        animation-name: worm2;
    }

    h1 {
        margin-top: 1em;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1.5em;
        font-weight: 500;
        color: #333;
        letter-spacing: 1px;
        text-shadow: 0 0 5px rgba(0, 0, 0, 0.05);
        animation: textFade 1.5s ease-in-out infinite alternate;
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --bg: #111111;
            --fg: #eeeeee;
        }

        .ip__track {
            stroke: #222;
            /* darker track for dark mode */
        }

        h1 {
            color: var(--fg);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            /* make sure bg gets applied */
        }
    }

    /* Animations */
    @keyframes worm1 {
        0% {
            stroke-dashoffset: 0;
        }

        50% {
            animation-timing-function: steps(1);
            stroke-dashoffset: -358;
        }

        50.01% {
            animation-timing-function: linear;
            stroke-dashoffset: 358;
        }

        100% {
            stroke-dashoffset: 0;
        }
    }

    @keyframes worm2 {
        0% {
            stroke-dashoffset: 358;
        }

        50% {
            stroke-dashoffset: 0;
        }

        100% {
            stroke-dashoffset: -358;
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: scale(0.95);
        }

        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    @keyframes pulse {

        0%,
        100% {
            transform: scale(1);
        }

        50% {
            transform: scale(1.03);
        }
    }

    @keyframes textFade {
        from {
            opacity: 0.6;
        }

        to {
            opacity: 1;
        }
    }
</style>

<div class="d-flex flex-column justify-content-center align-items-center h-100 w-100">
    <main>
        <svg class="ip" viewBox="0 0 256 128" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="#a18cd1" />
                    <stop offset="33%" stop-color="#fbc2eb" />
                    <stop offset="67%" stop-color="#fda085" />
                    <stop offset="100%" stop-color="#f6d365" />
                </linearGradient>

                <linearGradient id="grad2" x1="1" y1="0" x2="0" y2="0">
                    <stop offset="0%" stop-color="#f6d365" />
                    <stop offset="33%" stop-color="#fda085" />
                    <stop offset="67%" stop-color="#a1c4fd" />
                    <stop offset="100%" stop-color="#c2e9fb" />
                </linearGradient>
            </defs>
            <g fill="none" stroke-linecap="round" stroke-width="16">
                <g class="ip__track" stroke="#ddd">
                    <path d="M8,64s0-56,60-56,60,112,120,112,60-56,60-56" />
                    <path d="M248,64s0-56-60-56-60,112-120,112S8,64,8,64" />
                </g>
                <g stroke-dasharray="180 656">
                    <path class="ip__worm1" stroke="url(#grad1)" d="M8,64s0-56,60-56,60,112,120,112,60-56,60-56" />
                    <path class="ip__worm2" stroke="url(#grad2)" stroke-dashoffset="358"
                        d="M248,64s0-56-60-56-60,112-120,112S8,64,8,64" />
                </g>
            </g>
        </svg>
        <h1>L o a d i n g . . . . . . .</h1>
    </main>
</div>
{{ end }}
