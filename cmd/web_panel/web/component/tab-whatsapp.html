<script>
  $("#refresh-qr-btn").click(function () {
    let endpoint = $(this).data("endpoint");
    let qrCodeFileUrl = $(this).data("qr"); // fallback QR code file url

    if (!endpoint) {
      Swal.fire("Error", "No endpoint provided.", "error");
      return;
    }

    Swal.fire({
      title: "Fetching QR Code...",
      allowOutsideClick: false,
      allowEscapeKey: false,
      didOpen: () => {
        Swal.showLoading();

        $.ajax({
          url: endpoint,
          method: "GET",
          success: function (response) {
            if (response.qrcode) {
              // Render fresh QR code as image
              QRCode.toDataURL(response.qrcode, function (error, url) {
                if (error) {
                  Swal.fire(
                    "Error",
                    "Failed to generate QR Code image.",
                    "error"
                  );
                } else {
                  Swal.fire({
                    title: "Scan this QR Code with WhatsApp",
                    imageUrl: url,
                    imageAlt: "QR Code",
                    allowOutsideClick: false,
                    allowEscapeKey: false,
                    confirmButtonText: "Close",
                  });
                }
              });
            } else {
              // fallback to load saved QR code text file
              if (!qrCodeFileUrl) {
                Swal.fire(
                  "Info",
                  response.message || "No QR code available",
                  "info"
                );
                return;
              }
              $.get(qrCodeFileUrl, function (qrText) {
                QRCode.toDataURL(qrText, function (error, url) {
                  if (error) {
                    Swal.fire(
                      "Error",
                      "Failed to generate fallback QR Code image.",
                      "error"
                    );
                  } else {
                    Swal.fire({
                      title: response.message || "Use this QR Code",
                      imageUrl: url,
                      imageAlt: "Fallback QR Code",
                      allowOutsideClick: false,
                      allowEscapeKey: false,
                      confirmButtonText: "Close",
                    });
                  }
                });
              }).fail(function () {
                Swal.fire(
                  "Error",
                  "Failed to load fallback QR code file.",
                  "error"
                );
              });
            }
          },
          error: function () {
            Swal.fire("Error", "Failed to fetch QR code.", "error");
          },
        });
      },
    });
  });

  $("#end_session_whatsapp").click(function () {
    let endpoint = $(this).data("endpoint");

    if (!endpoint) {
      Swal.fire("Error", "No endpoint provided.", "error");
      return;
    }

    Swal.fire({
      title: "End WhatsApp Session",
      text: "Are you sure you want to end the WhatsApp session?",
      icon: "warning",
      showCancelButton: true,
      confirmButtonText: "Yes, end it!",
      cancelButtonText: "No, keep it",
      customClass: {
        confirmButton: "btn btn-danger me-2",
        cancelButton: "btn btn-primary",
      },
      buttonsStyling: false,
    }).then((result) => {
      if (result.isConfirmed) {
        $.ajax({
          url: endpoint,
          method: "GET",
          success: function (response) {
            Swal.fire(
              "Success",
              response.message || "Session ended.",
              "success"
            );
            // location.reload(); // optionally reload
          },
          error: function (error) {
            const res = error.responseJSON || {};
            const message =
              res.message ||
              `End Session Failed: [${error.status}] ${error.responseText}`;
            const detail = Array.isArray(res.detail)
              ? res.detail
                  .map((d) => `<div class="text-danger">${d}</div>`)
                  .join("")
              : "";

            Swal.fire({
              icon: "error",
              title: "Error",
              html: `<div>${message}</div>${detail}`,
            });
          },
        });
      }
    });
  });

  $(function () {
    $('[data-bs-toggle="tooltip"]').each(function () {
      const $el = $(this);
      // Check if tooltip is already initialized
      if (!$el.data("bs.tooltip")) {
        $el.tooltip();
        // $el.tooltip('show');
      }
    });
  });

  $(document).ready(function () {
    const $table = $("#whatsapp_group");
    const dataUrl = $table.data("url");

    $table.DataTable({
      ajax: {
        url: dataUrl,
        type: "GET",
        dataSrc: "", // because we're returning an array directly
        beforeSend: function () {
          // Show DataTables built-in processing indicator
          $table
            .closest(".dataTables_wrapper")
            .find(".dataTables_processing")
            .show();
        },
        complete: function () {
          // Hide DataTables built-in processing indicator
          $table
            .closest(".dataTables_wrapper")
            .find(".dataTables_processing")
            .hide();
        },
        error: function (error) {
          const res = error.responseJSON || {};
          const message =
            res.message ||
            `Get Data WAG Failed: [${error.status}] ${error.responseText}`;
          const detail = Array.isArray(res.detail)
            ? res.detail
                .map((d) => `<div class="text-danger">${d}</div>`)
                .join("")
            : "";

          Swal.fire({
            icon: "error",
            title: "Error",
            html: `<div>${message}</div>${detail}`,
          });
        },
      },
      processing: true, // enable built-in processing indicator
      columns: [
        { data: null }, // for responsive control
        { data: "JID" },
        { data: "Name" },
        {
          data: null,
          render: function (data, type, row) {
            const avatarUrl = row.OwnerAvatar || "/assets/self/img/no-img.jpg";
            const ownerJID = row.OwnerJID || "N/A";
            const ownerName = row.OwnerName || "No Verified Business Name";

            return `
                    <div class="d-flex justify-content-start align-items-center user-name">
                        <div class="avatar-wrapper">
                        <div class="avatar me-2" style="cursor:pointer;" onclick="showAvatarModal('${avatarUrl}')">
                        <img src="${avatarUrl}" alt="Owner Avatar" class="rounded-circle" style="width:40px; height:40px;">
                        </div>
                        </div>
                        <div class="d-flex flex-column">
                        <span class="emp_jid text-truncate" style="font-weight:600;">${ownerJID}</span>
                        <small class="emp_name text-truncate text-muted">${ownerName}</small>
                        </div>
                    </div>
                    `;
          },
          orderable: false,
        },
        { data: "GroupCreated" },
        {
          data: "Participants",
          render: (participants) => {
            if (!Array.isArray(participants)) return "";
            return participants
              .map(
                (p) => `
                    <div style="display:flex; align-items:center; margin-bottom:3px;">
                        <img 
                        src="${p.Avatar || "/assets/self/img/no-img.jpg"}" 
                        alt="Participant Avatar" 
                        style="width:24px; height:24px; border-radius:50%; margin-right:6px; cursor:pointer;"
                        onclick="showAvatarModal('${
                          p.Avatar || "/assets/self/img/no-img.jpg"
                        }')"
                        >
                        <span>${p.Name || p.JID}</span>
                    </div>
                    `
              )
              .join("");
          },
        },
      ],
      columnDefs: [
        {
          className: "control",
          orderable: false,
          searchable: false,
          responsivePriority: 1,
          targets: 0,
          render: function () {
            return "";
          },
        },
      ],
      responsive: {
        details: {
          type: "column",
          target: 0,
        },
      },
      order: [[1, "asc"]],
      pageLength: 10,
    });
  });
</script>
