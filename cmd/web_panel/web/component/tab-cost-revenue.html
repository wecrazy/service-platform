                </div>
                <div class="col-auto d-flex align-items-end ms-auto gap-2">
                    <div class="dropdown">
                        <button class="btn btn-outline-success dropdown-toggle" type="button" id="report-dropdown-btn"

    <figure class="highcharts-figure">
        <div id="container-revenue-cost" class="highcharts-light"></div>
        
        <!-- Collapsible Description -->
        <div class="text-center my-3">
            <button class="btn btn-sm btn-outline-info" type="button" data-bs-toggle="collapse" data-bs-target="#chartDescription" aria-expanded="false" aria-controls="chartDescription">
                <i class="fad fa-info-circle me-1"></i> How This Chart Works
            </button>
        </div>
        
        <div class="collapse" id="chartDescription">
            <p class="highcharts-description">
                <strong>How This Chart Works:</strong><br><br>
                
                <strong>📊 Chart Type:</strong> Daily time-series with accumulated trends<br>
                • <strong>Columns (Clickable):</strong> Daily ticket counts for Revenue, Cost to Technicians, and Cost of Penalty<br>
                • <strong>Lines:</strong> Accumulated counts and prices over time<br>
                • <strong>Drill-down:</strong> Click any daily column to see breakdown by Company and Task Type for that specific day<br><br>
                
                <strong style="color: #2ecc71;">Revenue:</strong><br>
                • Tickets with <code>stage</code> IN ('Done', 'Waiting For Verification', 'Closed', 'Solved Pending') AND <code>complete_wo</code> IS NOT NULL<br>
                • OR tickets with <code>stage</code> = 'Pending' AND <code>sla_status</code> = 'On Target Solved'<br>
                • Priced based on company and task type from Inventory Product Template<br><br>
                
                <strong style="color: #e67e22;">Cost to Technicians:</strong><br>
                • Tickets with <code>complete_wo</code> IS NOT NULL AND <code>stage</code> IN ('Done', 'Waiting For Verification', 'Closed', 'Solved Pending')<br>
                • OR tickets with <code>stage</code> = 'Pending' AND <code>sla_status</code> = 'On Target Solved'<br>
                • Fixed cost per ticket from system configuration<br><br>
                
                <strong style="color: #e74c3c;">Cost of Penalty:</strong><br>
                • Tickets with <code>stage</code> = 'New' AND (<code>sla_status</code> = 'Overdue (New)' OR 'Overdue (Visited)')<br>
                • Fixed penalty per ticket from system configuration<br><br>
                
                <strong style="color: #3498db;">Profit:</strong><br>
                • Revenue - (Cost to Technicians + Cost of Penalty)<br>
                • Available in both ticket count and monetary value (Rupiah)<br><br>
                
                <strong>💡 Tip:</strong> Hover over any point to see both ticket count and total price. Click on daily bars to drill down into company-task breakdown for that specific day.
            </p>
        </div>
    </figure>
