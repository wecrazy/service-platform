<div id="dataNonPMMTI" class="accordion accordion-popout">
    <div class="accordion-item card">
        <div class="accordion-header text-body d-flex justify-content-between align-items-center"
            id="accordionPopoutIconOne">
            <div class="d-flex align-items-center">
                <button type="button" class="accordion-button bg-secondary text-white" data-bs-toggle="collapse"
                    data-bs-target="#dataNonPMMTI-1" aria-controls="dataNonPMMTI-1" aria-expanded="true">
                    <div class="display-5 me-4">
                        <i class="fad fa-chart-bar me-2"></i>
                        Non-PM (<span style="text-decoration: line-through;">Preventive Maintenance</span>)
                    </div>
                </button>
            </div>

            <!-- RIGHT: ..... -->
            <div class="d-flex align-items-center flex-shrink-0 ms-auto ps-3">
                <div class="last_updated_data_mti text-muted me-3" style="min-width: 150px;">
                    <!-- Last Update -->
                </div>

                <div class="dropdown me-2">
                    <button class="btn btn-success excel-report-non-pm dropdown-toggle" type="button"
                        data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="far fa-file-spreadsheet me-2"></i>
                        Report
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#"
                                onclick="downloadExcelReportNonPMMTI('{{.userid}}','{{.REPORT_ALL_NON_PM_MTI}}', 'ALL')">All
                                Data</a></li>
                        <li><a class="dropdown-item" href="#"
                                onclick="downloadExcelReportNonPMMTI('{{.userid}}','{{.REPORT_DATA_FILTERED_NON_PM_MTI}}', 'Filtered')">Data
                                <b>(Filtered)</b></a></li>
                    </ul>
                </div>

                <button type="button" class="btn btn-secondary btn-refresh-data-mti me-2"
                    onclick="refreshDataMTI('{{.REFRESH_TABLE_DATA_MTI}}', 'last_updated_data_mti', 'dt_data_non_pm_mti', 'btn-refresh-data-mti')">
                    <i class="far fa-sync-alt me-2"></i>
                    Refresh
                </button>
            </div>

        </div>

        <div class="container-fluid m-0 p-0">
            <div class="row">
                <div class="col-sm-12 col-md-12 col-lg-12 mb-3">
                    <!-- Pivot Accordion -->
                    <div id="accordionPopoutIcon" class="accordion mt-3 accordion-popout">
                        <div class="accordion-item card">
                            <h2 class="accordion-header text-body d-flex justify-content-between fs-2"
                                id="accordionPopoutIconOne">
                                <button type="button" class="accordion-button collapsed" data-bs-toggle="collapse"
                                    data-bs-target="#accordionPopoutIcon-1" aria-controls="accordionPopoutIcon-1">
                                    <i class="fal fa-table me-2 fs-2"></i>
                                    <span class="fs-2">Pivot</span>
                                </button>
                            </h2>
                            <div id="accordionPopoutIcon-1" class="accordion-collapse collapse"
                                data-bs-parent="#accordionPopoutIcon">
                                <div class="accordion-body">
                                    <div class="container-fluid">
                                        <div class="row">
                                            <div class="col-12">
                                                <div style="max-height: 400px; overflow-y: auto;">
                                                    <div id="pivot-non-pm-mti" class="shadow-sm">
                                                        <div class="text-center py-4" id="pivot-loading">
                                                            <span class="spinner-border text-info" role="status"></span>
                                                            <span class="ms-2">Loading pivot data...</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-12 col-md-12 col-lg-12 mb-3">
                    <!-- Bar Chart Accordion -->
                    <div id="accordionBarChart" class="accordion mt-3 accordion-popout">
                        <div class="accordion-item card">
                            <h2 class="accordion-header text-body d-flex justify-content-between fs-2"
                                id="accordionBarChartHeader">
                                <button type="button" class="accordion-button collapsed" data-bs-toggle="collapse"
                                    data-bs-target="#accordionBarChart-1" aria-controls="accordionBarChart-1">
                                    <span class="fs-2">
                                        SLA Status
                                    </span>
                                    <i class="fal fa-chart-bar ms-2 fs-2"></i>
                                </button>
                            </h2>
                            <div id="accordionBarChart-1" class="accordion-collapse collapse"
                                data-bs-parent="#accordionBarChart">
                                <div class="accordion-body">
                                    <div class="container-fluid">
                                        <div class="row">
                                            <div class="col-12">
                                                <figure class="highcharts-figure">
                                                    <div id="bar-chart-non-pm-mti" class="highcharts-light"></div>
                                                    <p class="highcharts-description text-center">
                                                        Distribution of PM statuses: Terkunjungi (Visited), Gagal
                                                        Terkunjungi
                                                        (Failed Visit), and Belum Kunjungan (Not Yet Visited). Use the
                                                        dropdown
                                                        above to view data for individual banks or all banks combined.
                                                    </p>
                                                </figure>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <!-- Details Section -->
                    <div class="accordion-body mt-2">
                        {{.TABLE_DATA_NON_PM_MTI}}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
