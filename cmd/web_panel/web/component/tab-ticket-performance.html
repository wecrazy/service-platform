<body>
    <!-- Content -->
    <div class="m-2">
        <form id="filter-form">
            <div class="row mb-3 align-items-end g-2">
                <div class="col-md-3">
                    <label for="multicol-data-date" class="form-label">Data Range</label>

                        <!-- More options will be added here soon -->
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="multicol-sac" class="form-label">SAC</label>
                    <select id="multicol-sac" class="select2 form-select" data-allow-clear="true" multiple>
                        <!-- More options will be added here soon -->
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="multicol-spl" class="form-label">SPL</label>
                    <select id="multicol-spl" class="select2 form-select" data-allow-clear="true" multiple>

                    </select>
                </div>
                <div class="col-md-3">
                    <label for="multicol-technician" class="form-label">Technician</label>
                    <select id="multicol-technician" class="select2 form-select" data-allow-clear="true" multiple>
                        <!-- More options will be added here soon -->
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="multicol-company" class="form-label">Company</label>
                    <select id="multicol-company" class="select2 form-select" data-allow-clear="true" multiple>
                        <!-- More options will be added here soon -->
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="multicol-sla-status" class="form-label">SLA Status</label>
                    <select id="multicol-sla-status" class="select2 form-select" data-allow-clear="true" multiple>
                        <!-- More options will be added here soon -->
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="multicol-task-type" class="form-label">Task Type</label>
                    <select id="multicol-task-type" class="select2 form-select" data-allow-clear="true" multiple>
                        <!-- More options will be added here soon -->
                    </select>
                </div>
                <div class="col-auto d-flex align-items-end ms-auto gap-2">
                    <div class="dropdown">
                        <button class="btn btn-outline-success dropdown-toggle" type="button" id="report-dropdown-btn"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fad fa-download me-2"></i> Report
                        </button>
                        <ul class="dropdown-menu">
                            <li>
                                <a class="dropdown-item" href="#" onclick="handleReportClick(event, 'filtered')">
                                    Report Filtered
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" href="#" onclick="handleReportClick(event, 'master')"
                                    data-bs-toggle="tooltip" data-bs-placement="right"
                                    title="Report is only available for current month data">
                                    Report (Master)
                                </a>
                            </li>
                        </ul>
                    </div>
                    <button type="submit" class="btn btn-label-primary" id="filter-submit">
                        <i class="fad fa-search me-2"></i> Filter
                    </button>
                </div>
            </div>
        </form>
    </div>

    <figure class="highcharts-figure">
        <div id="container" class="highcharts-light">
            <!-- Chart goes here  !! -->
        </div>
        <div class="mt-2 d-flex justify-content-end">
            <button type="button" class="btn btn-sm btn-outline-secondary" id="toggle-chart-description">
                <i class="fad fa-info-circle me-1"></i> Show Description
            </button>
        </div>
        <div id="chart-description" class="alert alert-info" style="display: none;">
            <h6 class="alert-heading">Chart Description</h6>
            <p class="mb-2">
                This chart displays the <strong>Ticket Performance (Achievements)</strong> data from ODOO MS. 
                The data is based on tickets within the selected date range.
            </p>
            <h6 class="mt-3 mb-2"><small>Available Series:</small></h6>
            <ul class="mb-2">
                <li><strong>Total PM (Accumulated):</strong> Cumulative count of Preventive Maintenance tickets based on <code>received_spk_at</code></li>
                <li><strong>Total PM (Per Day):</strong> Daily count of PM tickets (hidden by default)</li>
                <li><strong>Total Non-PM (Accumulated):</strong> Cumulative count of Non-PM tickets (task_type != 'Preventive Maintenance')</li>
                <li><strong>Total Non-PM (Per Day):</strong> Daily count of Non-PM tickets (hidden by default)</li>
                <li><strong>Total Non-PM Overdue (Accumulated):</strong> Cumulative count of overdue Non-PM tickets (hidden by default)</li>
                <li><strong>Total Non-PM Overdue (Per Day):</strong> Daily count of overdue Non-PM tickets (hidden by default)</li>
                <li><strong>Total Ticket (Accumulated):</strong> Cumulative total of all tickets received</li>
                <li><strong>Total Ticket (Per Day):</strong> Daily count of all tickets (hidden by default)</li>
                <li><strong>Target:</strong> Daily cumulative target based on total tickets divided by days (hidden by default)</li>
                <li><strong>Total Achievement (Accumulated):</strong> Cumulative tickets completed (based on <code>complete_wo</code>, excluding 'Cancel' stage)</li>
                <li><strong>Total Achievement / Day:</strong> Daily count of completed tickets (hidden by default)</li>
            </ul>
            <p class="mb-1 text-muted"><small><em>Note: Series marked as "hidden by default" can be toggled on/off via the chart legend.</em></small></p>
        </div>
    </figure>
