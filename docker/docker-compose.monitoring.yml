version: '3.8'

# Compatible with both Docker Compose and Podman Compose
# Podman automatically handles user namespaces and SELinux labels

services:
  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: service-platform-prometheus
    ports:
      - "0.0.0.0:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=72h'     # Reduced from 200h to 72h
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'    # Enable remote write receiver for k6
      - '--storage.tsdb.min-block-duration=2h'  # Faster block creation
      - '--storage.tsdb.max-block-duration=2h'  # Smaller blocks
    environment:
      - PROMETHEUS_CONFIG_FILE=/etc/prometheus/prometheus.yml
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M                          # Limit memory usage
        reservations:
          memory: 128M

  loki:
    image: docker.io/grafana/loki:latest
    container_name: service-platform-loki
    ports:
      - "0.0.0.0:${LOKI_PORT:-3100}:3100"
    volumes:
      - loki_data:/loki
      - ../monitoring/loki/loki-config.yml:/etc/loki/local-config.yml:ro
    command: -config.file=/etc/loki/local-config.yml
    environment:
      - LOKI_RETENTION_PERIOD=72h
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  tempo:
    image: docker.io/grafana/tempo:latest
    container_name: service-platform-tempo
    ports:
      - "0.0.0.0:${TEMPO_OTLP_GRPC_PORT:-4317}:4317"  # OTLP gRPC
      - "0.0.0.0:${TEMPO_API_PORT:-3200}:3200"        # API
    volumes:
      - tempo_data:/var/tempo
      - ../monitoring/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
    command: -config.file=/etc/tempo/tempo-config.yml
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Nginx reverse proxy for securing Loki, Tempo, and Grafana
  nginx-auth:
    image: docker.io/library/nginx:latest
    container_name: service-platform-nginx-auth
    ports:
      - "0.0.0.0:${NGINX_PORT:-9180}:80"
    volumes:
      - ../monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../monitoring/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      - monitoring
    depends_on:
      - grafana
      - loki
      - tempo
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # Nginx Prometheus Exporter to expose Nginx metrics
  nginx-exporter:
    image: docker.io/nginx/nginx-prometheus-exporter:latest
    container_name: service-platform-nginx-exporter
    ports:
      - "0.0.0.0:9113:9113"                                 # Prometheus scrape target
    command:
      - -nginx.scrape-uri=http://nginx-auth/nginx_status
    networks:
      - monitoring
    depends_on:
      - nginx-auth
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: service-platform-grafana
    ports:
      - "0.0.0.0:${GRAFANA_PORT:-3063}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_USERS_DEFAULT_THEME=dark
      - GF_SECURITY_ADMIN_PASSWORD=Net55206011##
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_LOG_LEVEL=warn                               # warn | info | debug | error
      - GF_LOG_MODE=console                             # Console logging only
      - GF_ANALYTICS_REPORTING_ENABLED=false            # Disable analytics
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false            # Disable update checks
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=false # Security
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G                                    # Limit Grafana memory usage
        reservations:
          memory: 512M

  libretranslate:
    image: docker.io/libretranslate/libretranslate:latest
    container_name: service-platform-libretranslate
    ports:
      - "0.0.0.0:${LT_PORT:-5004}:${LT_PORT:-5004}"
    command: ["--port", "${LT_PORT:-5004}", "--metrics", "--load-only", "en,id", "--update-models"]
    volumes:
      - libretranslate_local:/home/libretranslate/.local
      - libretranslate_db:/app/db
    environment:
      - LT_PORT=${LT_PORT:-5004}
    networks:
      - monitoring    
    stdin_open: true
    tty: true    
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 35G    # LibreTranslate can be memory intensive
        reservations:
          memory: 512M

  k6:
    image: docker.io/grafana/k6:latest
    profiles: ["test"]
    container_name: service-platform-k6
    ports:
      - "0.0.0.0:${K6_PORT:-6680}:6680"               # k6 REST API and Web UI
    volumes:
      - ../tests/k6:/scripts:ro                       # Mount k6 test scripts (read-only)
      - k6_results:/results                           # Store test results
    environment:
      - K6_PROMETHEUS_RW_SERVER_URL=http://prometheus:9090/api/v1/write
      - K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM=true
      - K6_WEB_DASHBOARD=true
      - K6_WEB_DASHBOARD_EXPORT=/results/k6-report.html
      - K6_WEB_DASHBOARD_PORT=6680
      - K6_OUT=experimental-prometheus-rw
      # Service URLs accessible via host
      - API_BASE_URL=http://host.containers.internal:6221
      - GRPC_BASE_URL=host.containers.internal:50041
      - WHATSAPP_GRPC_URL=host.containers.internal:50042
      - SCHEDULER_GRPC_URL=host.containers.internal:50043
    extra_hosts:
      - "host.containers.internal:host-gateway"       # Enable access to host services
    networks:
      - monitoring
    restart: "no"                                     # k6 should run on-demand, not continuously
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    # Keep container running for on-demand test execution
    entrypoint: ["/bin/sh"]
    command: ["-c", "while true; do sleep 3600; done"]

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
  libretranslate_local:
  libretranslate_db:
  k6_results:

networks:
  monitoring:
    driver: bridge