      parameters:
      - description: Email
        in: path
        name: email
        required: true
        type: string
      - description: Confirm Password
        example: newpassword123
        in: formData
        name: confirm-password
        required: true
        type: string
      - description: Email address
        example: user@example.com
        in: formData
        name: email
        required: true
