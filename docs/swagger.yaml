      description: Processes user login credentials
      parameters:
      - description: Captcha value entered by user
        in: formData
        name: captcha
        type: string
      - description: Captcha ID
        in: formData
        name: captcha_id
        type: string
      - description: Email or Username
        example: admin
        in: formData
        name: email-username
        required: true
        type: string
      - description: Password
        example: password
        in: formData
        name: password
        required: true
