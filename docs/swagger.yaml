      parameters:
      - description: Sender phone number (e.g., whatsapp:+1234567890)
        in: formData
        name: From
        required: true
        type: string
      - description: Recipient phone number (e.g., whatsapp:+14155238886)
        in: formData
        name: To
        required: true
        type: string
      - description: Message body
        in: formData
        name: Body
        required: true
        type: string
      - description: Twilio Message SID
        in: formData
        name: MessageSid
        required: true
        type: string
      produces:
      - text/xml
      responses:
        "200":
          description: TwiML XML response
          schema:
            type: string
