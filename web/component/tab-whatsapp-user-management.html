<div class="container-xxl flex-grow-1 container-p-y">
  <!-- Header -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="card shadow-sm border-0" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="card-body text-white">
          <div class="d-flex align-items-center justify-content-between">
            <div>
              <h3 class="text-white mb-1">
                <i class="fad fa-user-cog me-2"></i><span data-i18n="whatsappUserManagement.title">WhatsApp User Management</span>
              </h3>
              <p class="text-white-50 mb-0" data-i18n="whatsappUserManagement.description">Manage WhatsApp users, permissions, and quotas</p>
            </div>
            <button class="btn btn-light" onclick="WhatsAppUserManager.showAddUserModal()">
              <i class="fas fa-plus me-2"></i><span data-i18n="whatsappUserManagement.addUser">Add User</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Filters and Search -->
  <div class="row mb-3">
    <div class="col-12">
      <div class="card shadow-sm border-0">
        <div class="card-body p-3">
          <div class="row g-2 align-items-center">
            <div class="col-md-2">
              <select class="form-select form-select-sm" id="user-type-filter">
                <option value="" data-i18n="whatsappUserManagement.allUserTypes">All User Types</option>
                <option value="common" data-i18n="whatsappUserManagement.userCommon">Common</option>
                <option value="super_user" data-i18n="whatsappUserManagement.superUser">Super User</option>
                <option value="client_user" data-i18n="whatsappUserManagement.clientUser">Client User</option>
                <option value="user_administrator" data-i18n="whatsappUserManagement.administrator">Administrator</option>
              </select>
            </div>
            <div class="col-md-2">
              <select class="form-select form-select-sm" id="user-of-filter">
                <option value="" data-i18n="whatsappUserManagement.allUserOf">All User Of</option>
                <option value="company_employee" data-i18n="whatsappUserManagement.companyEmployee">Company Employee</option>
                <option value="client_company_employee" data-i18n="whatsappUserManagement.clientCompanyEmployee">Client Company</option>
              </select>
            </div>
            <div class="col-md-2">
              <select class="form-select form-select-sm" id="status-filter">
                <option value="" data-i18n="whatsappUserManagement.allStatus">All Status</option>
                <option value="active" data-i18n="whatsappUserManagement.userActive">Active</option>
                <option value="banned" data-i18n="whatsappUserManagement.userBanned">Banned</option>
              </select>
            </div>
            <div class="col-md-6 text-end">
              <button class="btn btn-sm btn-primary" onclick="WhatsAppUserManager.searchUsers()">
                <i class="fas fa-filter me-1"></i><span data-i18n="whatsappUserManagement.applyFilters">Apply Filters</span>
              </button>
              <button class="btn btn-sm btn-outline-secondary" onclick="$('#user-type-filter, #user-of-filter, #status-filter').val(''); WhatsAppUserManager.searchUsers();">
                <i class="fas fa-times me-1"></i><span data-i18n="whatsappUserManagement.clear">Clear</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Statistics Cards -->
  <div class="row mb-4">
    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-center">
            <div class="avatar bg-primary me-3">
              <i class="fas fa-users text-white"></i>
            </div>
            <div>
              <h6 class="mb-0 text-muted" data-i18n="whatsappUserManagement.totalUsers">Total Users</h6>
              <h4 class="mb-0" id="stat-total">0</h4>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-center">
            <div class="avatar bg-success me-3">
              <i class="fas fa-check-circle text-white"></i>
            </div>
            <div>
              <h6 class="mb-0 text-muted" data-i18n="whatsappUserManagement.userActive">Active</h6>
              <h4 class="mb-0" id="stat-active">0</h4>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-center">
            <div class="avatar bg-warning me-3">
              <i class="fab fa-whatsapp text-white"></i>
            </div>
            <div>
              <h6 class="mb-0 text-muted" data-i18n="whatsappUserManagement.registeredWA">Registered WA</h6>
              <h4 class="mb-0" id="stat-registered">0</h4>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-center">
            <div class="avatar bg-danger me-3">
              <i class="fas fa-ban text-white"></i>
            </div>
            <div>
              <h6 class="mb-0 text-muted" data-i18n="whatsappUserManagement.banned">Banned</h6>
              <h4 class="mb-0" id="stat-banned">0</h4>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Users Table -->
  <div class="row">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-header bg-transparent border-bottom d-flex justify-content-between align-items-center">
          <h5 class="mb-0" data-i18n="whatsappUserManagement.whatsappUsers">WhatsApp Users</h5>
          <div>
            <button class="btn btn-sm btn-outline-info me-2" onclick="WhatsAppUserManager.downloadImportTemplate()">
              <i class="fas fa-file-download me-2"></i><span data-i18n="whatsappUserManagement.downloadTemplate">Download Template</span>
            </button>
            <button class="btn btn-sm btn-outline-primary me-2" onclick="WhatsAppUserManager.showImportModal()">
              <i class="fas fa-file-import me-2"></i><span data-i18n="whatsappUserManagement.importUsers">Import Users</span>
            </button>
            <button class="btn btn-sm btn-outline-success me-2" onclick="WhatsAppUserManager.exportUsers()">
              <i class="fas fa-download me-2"></i><span data-i18n="whatsappUserManagement.export">Export</span>
            </button>
            <button class="btn btn-sm btn-outline-primary" onclick="WhatsAppUserManager.refreshUsersTable()">
              <i class="fas fa-sync me-2"></i><span data-i18n="whatsappUserManagement.refresh">Refresh</span>
            </button>
          </div>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover table-striped w-100" id="users-table">
              <!-- DataTables will auto-generate thead and tbody -->
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit User Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="userModalTitle" data-i18n="whatsappUserManagement.addWhatsAppUser">Add WhatsApp User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="user-form">
          <input type="hidden" id="user-id">
          
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="user-full-name" class="form-label"><span data-i18n="whatsappUserManagement.fullName">Full Name</span> *</label>
                <input type="text" class="form-control" id="user-full-name" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="user-email" class="form-label"><span data-i18n="whatsappUserManagement.userEmail">Email</span> *</label>
                <input type="email" class="form-control" id="user-email" required>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="user-phone" class="form-label"><span data-i18n="whatsappUserManagement.phoneNumber">Phone Number</span> *</label>
                <input type="text" class="form-control" id="user-phone" required data-i18n="[placeholder]whatsappUserManagement.phonePlaceholder" placeholder="628123456789 or 085123456789">
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="user-type" class="form-label"><span data-i18n="whatsappUserManagement.userType">User Type</span> *</label>
                <select class="form-select" id="user-type" required>
                  <option value="common" data-i18n="whatsappUserManagement.userCommon">Common</option>
                  <option value="super_user" data-i18n="whatsappUserManagement.superUser">Super User</option>
                  <option value="client_user" data-i18n="whatsappUserManagement.clientUser">Client User</option>
                  <option value="user_administrator" data-i18n="whatsappUserManagement.administrator">Administrator</option>
                </select>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="user-of" class="form-label"><span data-i18n="whatsappUserManagement.userOf">User Of</span> *</label>
                <select class="form-select" id="user-of" required>
                  <option value="company_employee" data-i18n="whatsappUserManagement.companyEmployee">Company Employee</option>
                  <option value="client_company_employee" data-i18n="whatsappUserManagement.clientCompanyEmployee">Client Company Employee</option>
                </select>
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="allowed-chats" class="form-label"><span data-i18n="whatsappUserManagement.allowedChats">Allowed Chats</span> *</label>
                <select class="form-select" id="allowed-chats" required>
                  <option value="direct" data-i18n="whatsappUserManagement.directOnly">Direct Only</option>
                  <option value="group" data-i18n="whatsappUserManagement.groupOnly">Group Only</option>
                  <option value="both" data-i18n="whatsappUserManagement.chatBoth">Both</option>
                </select>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="max-daily-quota" class="form-label" data-i18n="whatsappUserManagement.maxDailyQuota">Max Daily Quota</label>
                <input type="number" class="form-control" id="max-daily-quota" value="10" min="1">
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label" data-i18n="whatsappUserManagement.permissions">Permissions</label>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="allowed-to-call">
                  <label class="form-check-label" for="allowed-to-call" data-i18n="whatsappUserManagement.allowedToCall">Allowed to Call</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="use-bot" checked>
                  <label class="form-check-label" for="use-bot" data-i18n="whatsappUserManagement.useBot">Use Bot</label>
                </div>
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label for="allowed-types" class="form-label" data-i18n="whatsappUserManagement.allowedMessageTypes">Allowed Message Types</label>
            <div class="row">
              <div class="col-md-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="text" id="type-text" checked>
                  <label class="form-check-label" for="type-text" data-i18n="whatsappUserManagement.msgText">Text</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="image" id="type-image">
                  <label class="form-check-label" for="type-image" data-i18n="whatsappUserManagement.msgImage">Image</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="video" id="type-video">
                  <label class="form-check-label" for="type-video" data-i18n="whatsappUserManagement.msgVideo">Video</label>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="document" id="type-document">
                  <label class="form-check-label" for="type-document" data-i18n="whatsappUserManagement.msgDocument">Document</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="audio" id="type-audio">
                  <label class="form-check-label" for="type-audio" data-i18n="whatsappUserManagement.msgAudio">Audio</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="sticker" id="type-sticker">
                  <label class="form-check-label" for="type-sticker" data-i18n="whatsappUserManagement.msgSticker">Sticker</label>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="location" id="type-location">
                  <label class="form-check-label" for="type-location" data-i18n="whatsappUserManagement.msgLocation">Location</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="contact" id="type-contact">
                  <label class="form-check-label" for="type-contact" data-i18n="whatsappUserManagement.msgContact">Contact</label>
                </div>
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label for="user-description" class="form-label" data-i18n="whatsappUserManagement.userDescription">Description</label>
            <textarea class="form-control" id="user-description" rows="3"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="table.cancelButton">Cancel</button>
        <button type="button" class="btn btn-success" onclick="WhatsAppUserManager.saveUser()">
          <i class="fas fa-save me-2"></i><span data-i18n="table.saveButton">Save</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- View User Details Modal -->
<div class="modal fade" id="viewUserModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" data-i18n="whatsappUserManagement.userDetails">User Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="user-details-content">
        <i class="fas fa-spinner fa-spin"></i> <span data-i18n="whatsappUserManagement.userLoading">Loading...</span>
      </div>
    </div>
  </div>
</div>

<script>
// Initialize WhatsApp User Manager when tab is loaded
if (typeof window.RANDOM_ACCESS === 'undefined') {
  window.RANDOM_ACCESS = '{{.RANDOM_ACCESS}}';
}

// Update i18n when language changes
function updateI18n() {
  if (typeof i18next !== 'undefined' && i18next.isInitialized) {
    document.querySelectorAll('[data-i18n]').forEach(element => {
      const key = element.getAttribute('data-i18n');
      if (key.startsWith('[placeholder]')) {
        const actualKey = key.replace('[placeholder]', '');
        element.setAttribute('placeholder', i18next.t(actualKey));
      } else {
        // Handle select options and regular elements differently
        if (element.tagName === 'OPTION') {
          // For option elements, set the text content
          element.textContent = i18next.t(key);
        } else {
          // For other elements, set innerHTML or textContent based on children
          if (element.children.length === 0 || element.querySelector('i, span')) {
            // If element has icon children, preserve them
            const icons = element.querySelectorAll('i');
            const text = i18next.t(key);
            if (icons.length > 0) {
              // Keep icons, update text
              const textNode = Array.from(element.childNodes).find(node => node.nodeType === Node.TEXT_NODE);
              if (textNode) {
                textNode.textContent = text;
              } else {
                element.appendChild(document.createTextNode(text));
              }
            } else {
              element.textContent = text;
            }
          } else {
            element.textContent = i18next.t(key);
          }
        }
      }
    });
  }
}

// Call updateI18n on page load and language change
if (typeof i18next !== 'undefined') {
  i18next.on('languageChanged', updateI18n);
  // Initial update
  setTimeout(updateI18n, 100);
}

// Initialize the user manager
if (window.WhatsAppUserManager) {
  window.WhatsAppUserManager.init();
}
</script>
