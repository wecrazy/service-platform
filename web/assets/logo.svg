<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" width="420" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="160" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="40" x2="420" y2="40"/>
    <line x1="0" y1="80" x2="420" y2="80"/>
    <line x1="0" y1="120" x2="420" y2="120"/>
    <line x1="80" y1="0" x2="80" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="160"/>
    <line x1="240" y1="0" x2="240" y2="160"/>
    <line x1="320" y1="0" x2="320" y2="160"/>
    <line x1="400" y1="0" x2="400" y2="160"/>
  </g>

  <!-- Connection lines (center to nodes) -->
  <g stroke="#00d4ff" stroke-opacity="0.30" stroke-width="1.1" stroke-dasharray="3,3">
    <line x1="75" y1="80" x2="44"  y2="47"/>
    <line x1="75" y1="80" x2="108" y2="47"/>
    <line x1="75" y1="80" x2="117" y2="80"/>
    <line x1="75" y1="80" x2="108" y2="113"/>
    <line x1="75" y1="80" x2="44"  y2="113"/>
    <line x1="75" y1="80" x2="33"  y2="80"/>
  </g>

  <!-- Outer glow ring -->
  <circle cx="75" cy="80" r="27" fill="none" stroke="#00d4ff" stroke-width="0.7" stroke-opacity="0.18"/>

  <!-- Center hexagon -->
  <polygon points="75,58 91,67 91,85 75,94 59,85 59,67"
           fill="url(#hexGrad)" filter="url(#softglow)" opacity="0.95"/>
  <polygon points="75,64 86,70 86,82 75,88 64,82 64,70"
           fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="75" cy="76" r="3.2" fill="#ffffff" opacity="0.85"/>

  <!-- API (44,47) code brackets cyan -->
  <g transform="translate(44,47)">
    <circle r="11" fill="#0f1117" stroke="#00d4ff" stroke-width="2" filter="url(#glow)"/>
    <polyline points="-3,-5 -6.5,0 -3,5" fill="none" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="3,-5 6.5,0 3,5" fill="none" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="1" y1="-4" x2="-1" y2="4" stroke="#00d4ff" stroke-width="1.3" stroke-linecap="round" stroke-opacity="0.7"/>
    <text y="22" text-anchor="middle" fill="#8892a4" font-size="5.5" font-family="'Segoe UI',sans-serif" letter-spacing="0.5">API</text>
  </g>

  <!-- gRPC (108,47) lightning bolt cyan -->
  <g transform="translate(108,47)">
    <circle r="11" fill="#0f1117" stroke="#00d4ff" stroke-width="2" filter="url(#glow)"/>
    <polygon points="2,-6 -1,-1 0.5,-1 -2,6 1,1 -0.5,1" fill="#00d4ff"/>
    <text y="22" text-anchor="middle" fill="#8892a4" font-size="5.5" font-family="'Segoe UI',sans-serif" letter-spacing="0.5">gRPC</text>
  </g>

  <!-- WhatsApp (117,80) speech bubble green -->
  <g transform="translate(117,80)">
    <circle r="11" fill="#0f1117" stroke="#25d366" stroke-width="2" filter="url(#glow)"/>
    <path d="M -5,-5 Q -5,-7 -3,-7 L 4,-7 Q 6,-7 6,-5 L 6,1 Q 6,3 4,3 L -1,3 L -3,6 L -3,3 Q -5,3 -5,1 Z" fill="#25d366"/>
    <path d="M -3,-5 Q -3,-6 -2,-6 L -1,-6 Q 0,-6 0,-5 L 0,-4 Q 0,-3 -1,-3 L -1,-2 Q 0,-1 1,-2 L 1,-3 Q 2,-3 2,-2 L 2,-1 Q 2,0 1,0 Q -3,0 -3,-5 Z" fill="white" opacity="0.92" transform="scale(0.82)"/>
    <text y="22" text-anchor="middle" fill="#8892a4" font-size="5.5" font-family="'Segoe UI',sans-serif" letter-spacing="0.3">WhatsApp</text>
  </g>

  <!-- Telegram (108,113) paper plane blue -->
  <g transform="translate(108,113)">
    <circle r="11" fill="#0f1117" stroke="#229ed9" stroke-width="2" filter="url(#glow)"/>
    <polygon points="-7,3 7,-4 3,7 0,2" fill="#229ed9"/>
    <line x1="0" y1="2" x2="7" y2="-4" stroke="#1370a0" stroke-width="1" stroke-linecap="round"/>
    <text y="22" text-anchor="middle" fill="#8892a4" font-size="5.5" font-family="'Segoe UI',sans-serif" letter-spacing="0.3">Telegram</text>
  </g>

  <!-- Scheduler (44,113) clock amber -->
  <g transform="translate(44,113)">
    <circle r="11" fill="#0f1117" stroke="#f59e0b" stroke-width="2" filter="url(#glow)"/>
    <circle r="6.5" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-2.5" y2="-4" stroke="#f59e0b" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="3.5" y2="-1" stroke="#f59e0b" stroke-width="1.2" stroke-linecap="round"/>
    <circle r="1" fill="#f59e0b"/>
    <text y="22" text-anchor="middle" fill="#8892a4" font-size="5.5" font-family="'Segoe UI',sans-serif" letter-spacing="0.3">Scheduler</text>
  </g>

  <!-- Observability (33,80) eye purple -->
  <g transform="translate(33,80)">
    <circle r="11" fill="#0f1117" stroke="#e879f9" stroke-width="2" filter="url(#glow)"/>
    <path d="M -7,0 Q 0,-6 7,0 Q 0,6 -7,0 Z" fill="none" stroke="#e879f9" stroke-width="1.6"/>
    <circle r="2.8" fill="#e879f9"/>
    <circle cx="1" cy="-1" r="0.9" fill="white" opacity="0.55"/>
    <text y="22" text-anchor="middle" fill="#8892a4" font-size="5.5" font-family="'Segoe UI',sans-serif" letter-spacing="0.3">Observability</text>
  </g>

  <!-- Wordmark -->
  <text x="155" y="72" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="-0.5">service</text>
  <text x="155" y="104" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="32" font-weight="300" fill="url(#hexGrad)" letter-spacing="1">platform</text>

  <!-- Accent underline -->
  <rect x="155" y="108" width="230" height="2" rx="1" fill="url(#hexGrad)" opacity="0.45"/>

  <!-- Tagline -->
  <text x="155" y="128" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.5" fill="#8892a4" letter-spacing="2">MODULAR · GO · MULTI-SERVICE</text>
</svg>