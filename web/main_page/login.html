<!DOCTYPE html>

<html lang="id" class="light-style layout-wide customizer-hide" dir="ltr" data-theme="theme-default"
  data-assets-path="{{.GLOBAL_URL}}assets/" data-template="vertical-menu-template">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

  <title>L o g i n</title>

  <meta name="description" content="" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="{{.APP_LOGO}}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
    rel="stylesheet" />

  <!-- Icons -->
  <link rel="stylesheet" href="{{.GLOBAL_URL}}assets/vendor/fonts/boxicons.css" />
  <link rel="stylesheet" href="{{.GLOBAL_URL}}assets/vendor/fonts/flag-icons.css" />
  <link rel="stylesheet" href="{{.GLOBAL_URL}}assets/vendor/libs/fontawesome5/fontawesome5.all.min.css" />

  <!-- Core CSS -->
  <link rel="stylesheet" href="{{.GLOBAL_URL}}assets/vendor/css/rtl/core.css" class="template-customizer-core-css" />
  <link rel="stylesheet" href="{{.GLOBAL_URL}}assets/vendor/css/rtl/theme-default.css"
    class="template-customizer-theme-css" />
  <link rel="stylesheet" href="{{.GLOBAL_URL}}assets/css/demo.css" />

  <!-- Vendors CSS -->
  <link rel="stylesheet" href="{{.GLOBAL_URL}}assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css" />
  <link rel="stylesheet" href="{{.GLOBAL_URL}}assets/vendor/libs/typeahead-js/typeahead.css" />
  <link rel="stylesheet" href="{{.GLOBAL_URL}}assets/vendor/libs/sweetalert2/sweetalert2.css" />

  <!-- Vendor -->
  <link rel="stylesheet" href="{{.GLOBAL_URL}}assets/vendor/libs/@form-validation/umd/styles/index.min.css" />

  <!-- Page CSS -->

  <!-- Page -->
  <link rel="stylesheet" href="{{.GLOBAL_URL}}assets/vendor/css/pages/page-auth.css" />

  <!-- Styles for interactive login behavior are injected by JavaScript at runtime -->
  <!-- Helpers -->
  <script src="{{.GLOBAL_URL}}assets/vendor/js/helpers.js"></script>
  <!--! Template customizer & Theme config files MUST be included after core stylesheets and helpers.js in the <head> section -->
  <script src="{{.GLOBAL_URL}}assets/vendor/js/template-customizer.js"></script>
  <!--? Config:  Mandatory theme config file contain global vars & default theme options, Set your preferred theme option in this file.  -->
  <script src="{{.GLOBAL_URL}}assets/js/config.js"></script>
  <script>
    window.GLOBAL_URL = "{{.GLOBAL_URL}}";
    window.ACTIVE_DEBUG = "{{.DEBUG}}" === "true";
  </script>
  <script src="{{.GLOBAL_URL}}assets/vendor/libs/fontawesome5/fontawesome5.pro.min.js"></script>
</head>

<body>
  <!-- Content -->

  <div class="container-xxl">
    <div class="authentication-wrapper authentication-basic container-p-y">
      <div class="authentication-inner">
        <!-- Register -->
        <div class="card">
          <div class="card-body">
            <!-- Logo -->
            <div class="app-brand justify-content-center">
              <a href="#" class="app-brand-link gap-2 d-flex align-items-center">
                <span class="app-brand-logo demo">
                  <img src="{{.APP_LOGO}}" width="50px" height="auto" class="move-left rounded" alt="Logo1" />
                </span>
              </a>
            </div>
            <!-- /Logo -->
            <!-- Responsive header: stack on small screens, keep row on larger ones. Add tooltip and truncation for long app names -->
            <div class="inline d-flex flex-column flex-sm-row align-items-center justify-content-center gap-1 text-center text-sm-start">
              <h4 class="mb-2 me-1" data-i18n="login.welcomeTo">Welcome to </h4>
              <!-- app-name will wrap (max 2 lines) and show the full name to screen readers via aria-label -->
              <h4 class="app-name mb-2 mb-sm-0" aria-label="{{.APP_NAME}}" data-bs-toggle="tooltip" title="{{.APP_NAME}}">{{.APP_NAME}}</h4>
            </div>
            <p class="mb-4" data-i18n="login.pleaseSignIn">Please sign-in to your account</p>

            <form id="formLoginAuthentication" class="mb-3">
              <div class="mb-3">
                <label for="email" class="form-label" data-i18n="login.email">Email</label>
                <input type="text" class="form-control glowing-border" id="email" name="email-username"
                  placeholder="example@email.com" autofocus />
                <h5 class="text-danger" id="delay_timer"></h5>
              </div>
              <div class="mb-3 form-password-toggle">
                <div class="d-flex justify-content-between">
                  <label class="form-label" for="password" data-i18n="login.password">Password</label>
                  <p class="text-center">
                    <a href="/forgot-password">
                      <small data-i18n="login.forgotPassword">Forgot Password</small>
                    </a>
                  </p>
                  <!-- <h6 class="text-primary" >
                      <small>Forgot Password?</small>
                    </h6> -->
                </div>
                <div id="password-container" class="input-group input-group-merge glowing-border">
                  <input type="password" id="password" class="form-control" name="password"
                    placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;"
                    aria-describedby="password" autocomplete="current-password" />
                  <span class="input-group-text cursor-pointer"><i class="fas fa-eye-slash"></i></span>
                </div>
              </div>
              <div class="mb-3">
                <div class="position-relative">
                  <canvas id="captcha-canvas" width="300" height="80" class="glowing-border" style="width:100%;height:auto;cursor:pointer;" onclick="refreshCaptcha()"></canvas>
                  <button type="button" class="btn btn-sm btn-secondary position-absolute top-0 end-0 opacity-50" onclick="refreshCaptcha()" title="Refresh CAPTCHA" data-i18n-title="login.refresh">
                    <i class="fas fa-sync-alt"></i>
                  </button>
                </div>
                <div class="position-relative mt-2">
                  <input type="text" class="form-control glowing-border" id="captcha-input" name="captcha" data-i18n-placeholder="login.captchaPlaceholder" maxlength="6" />
                  <small id="captcha-status" class="captcha-status text-muted" style="display:none;">&nbsp;</small>
                </div>
                <input type="hidden" name="captcha_hash" id="captcha_hash" value="" />
                <input type="hidden" name="client_captcha_valid" id="client_captcha_valid" value="0" />
              </div>
              <div class="mb-3 d-flex" id="submitContainer">
                <button class="btn btn-primary login-slide-btn disabled" id="signInBtn" type="submit" data-i18n="login.signIn">Sign in</button>
              </div>
            </form>

          </div>
        </div>
        <!-- /Register -->
      </div>
    </div>
  </div>

  <!-- / Content -->

  <!-- Core JS -->
  <!-- build:js assets/vendor/js/core.js -->

  <script src="{{.GLOBAL_URL}}assets/vendor/libs/jquery/jquery-3.7.1.min.js"></script>
  <script src="{{.GLOBAL_URL}}assets/vendor/libs/popper/popper.js"></script>
  <script src="{{.GLOBAL_URL}}assets/vendor/js/bootstrap.js"></script>
  <script src="{{.GLOBAL_URL}}assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
  <script src="{{.GLOBAL_URL}}assets/vendor/libs/hammer/hammer.js"></script>
  <script src="{{.GLOBAL_URL}}assets/vendor/libs/i18n/i18n.js"></script>
  <script src="{{.GLOBAL_URL}}assets/vendor/libs/typeahead-js/typeahead.js"></script>
  <script src="{{.GLOBAL_URL}}assets/vendor/js/menu.js"></script>
  <script src="{{.GLOBAL_URL}}assets/vendor/libs/sweetalert2/sweetalert2.js"></script>

  <!-- endbuild -->

  <!-- Vendors JS -->
  <script src="{{.GLOBAL_URL}}assets/vendor/libs/@form-validation/umd/bundle/popular.min.js"></script>
  <script src="{{.GLOBAL_URL}}assets/vendor/libs/@form-validation/umd/plugin-bootstrap5/index.min.js"></script>
  <script src="{{.GLOBAL_URL}}assets/vendor/libs/@form-validation/umd/plugin-auto-focus/index.min.js"></script>

  <!-- Main JS -->
  <script src="{{.GLOBAL_URL}}assets/js/main.js"></script>

  <!-- Page JS -->
  <script src="{{.GLOBAL_URL}}assets/self/captcha.js?_=v{{.APP_VERSION_CODE}}"></script>
  <script src="{{.GLOBAL_URL}}assets/self/login.js?_=v{{.APP_VERSION_CODE}}"></script>

  
</body>

</html>
