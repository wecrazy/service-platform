user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=loki_limit:10m rate=20r/s;

    # Upstream services
    upstream grafana_backend {
        server grafana:3000;
    }

    upstream loki_backend {
        server loki:3100;
    }

    upstream tempo_backend {
        server tempo:3200;
    }

    # Grafana reverse proxy with basic auth
    server {
        listen 80;
        server_name grafana localhost;
        
        location / {
            auth_basic "Grafana Access";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://grafana_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            
            # Disable buffering for live updates
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }

    # Loki reverse proxy with basic auth
    server {
        listen 80;
        server_name loki localhost;

        location / {
            auth_basic "Loki Access";
            auth_basic_user_file /etc/nginx/.htpasswd;
            
            limit_req zone=loki_limit burst=30 nodelay;

            proxy_pass http://loki_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Large request body support for log pushing
            client_max_body_size 100M;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # Tempo reverse proxy with basic auth
    server {
        listen 80;
        server_name tempo localhost;

        location / {
            auth_basic "Tempo Access";
            auth_basic_user_file /etc/nginx/.htpasswd;
            
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://tempo_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Health check endpoint (no auth required)
    server {
        listen 80;
        server_name health localhost;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Nginx metrics endpoint for Prometheus exporter (no auth required)
    server {
        listen 80;
        server_name metrics localhost;

        location /nginx_status {
            stub_status on;
            access_log off;
            allow all;
        }
    }
}
